[package]
name = "miniconf_mqtt"
version = "0.20.0"
description = "MQTT interface for `miniconf`, using `minimq`"
authors.workspace = true
edition.workspace = true
license.workspace = true
categories.workspace = true
keywords.workspace = true
repository.workspace = true

[lints]
workspace = true

[lib]

[features]
default = []
introspection = ["dep:serde", "dep:serde-json-core", "miniconf/attrs", "miniconf/sem"]

[dependencies]
miniconf = { version = "0.20.1", features = [
    "json-core",
], default-features = false, path = "../miniconf" }
minimq = { git = "https://github.com/quartiq/minimq.git" }
embedded-io = "0.7"
log = "0.4"
heapless = "0.9.1"
serde = { version = "1", default-features = false, features = ["derive"], optional = true }
serde-json-core = { version = "0.6.0", optional = true }
strum = { version = "0.28", features = ["derive"], default-features = false }
thiserror = { version = "2", default-features = false }

[[example]]
name = "mqtt"

[dev-dependencies]
embassy-time = { version = "0.5.1", features = ["std", "generic-queue-8"] }
env_logger = "0.11"
tokio = { version = "1.9", features = ["rt-multi-thread", "time", "macros"] }
std-embedded-nal-async = "0.4"
miniconf = { features = [
    "json-core",
    "derive",
    "heapless-09",
], path = "../miniconf" }
serde = "1"
heapless = { version = "0.9", features = ["serde"] }
