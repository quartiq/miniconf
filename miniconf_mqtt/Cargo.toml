[package]
name = "miniconf_mqtt"
version = "0.20.0"
description = "MQTT interface for `miniconf`, using `minimq`"
authors.workspace = true
edition.workspace = true
license.workspace = true
categories.workspace = true
keywords.workspace = true
repository.workspace = true

[lints]
workspace = true

[lib]

[dependencies]
miniconf = { version = "0.20.1", features = [
    "json-core",
], default-features = false, path = "../miniconf" }
minimq = { path = "../../minimq", features = ["logging"] }
embedded-io = "0.7"
log = "0.4"
heapless = "0.9.1"
strum = { version = "0.28", features = ["derive"], default-features = false }

[[example]]
name = "mqtt"

[dev-dependencies]
embassy-time = { version = "0.5.1", features = ["std", "generic-queue-8"] }
env_logger = "0.11"
tokio = { version = "1.9", features = ["rt-multi-thread", "time", "macros"] }
std-embedded-nal-async = "0.4"
miniconf = { features = [
    "json-core",
    "derive",
    "heapless-09",
], path = "../miniconf" }
serde = "1"
heapless = { version = "0.9", features = ["serde"] }
